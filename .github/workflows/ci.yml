name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest
      - name: Sync deps
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check api/ tests/ tools/
      - name: Ruff format check
        run: uv run ruff format --check api/ tests/ tools/
      - name: Pytest (unit only)
        run: uv run pytest -q -m "not integration"

  openapi-drift:
    name: openapi schema drift
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest
      - name: Sync deps
        run: uv sync --extra dev
      - name: Check schema artifact is up to date
        run: uv run python -m tools.dump_openapi --check

  integration:
    name: real-Docker integration tests
    runs-on: ubuntu-latest
    needs: lint-and-unit
    # Docker is preinstalled on ubuntu-latest GitHub runners; just
    # confirm the daemon is up before pulling/building.
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: latest
      - name: Sync deps
        run: uv sync --extra dev
      - name: Check Docker is running
        run: docker version --format '{{.Server.Version}}'
      - name: Build sandbox-runtime image
        run: docker build -t sandbox-runtime:latest sandbox/
      - name: Pre-create sandbox_egress network
        run: docker network create sandbox_egress || true
      - name: Run integration suite
        run: uv run pytest -q -m integration
        env:
          # CI has no runsc registered, so dev-mode bypass is required.
          SANDBOX_DEV_MODE: "1"
